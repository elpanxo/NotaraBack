# ============================================================
# notara-backend / .github/workflows/deploy.yml
# Pipeline CI/CD — Build 8 microservicios → 1 repo ECR (notara-back)
#                   con tags por servicio → EKS
#
# IMPORTANTE: Usamos UN SOLO repositorio ECR llamado "notara-back".
# Cada microservicio se diferencia por el TAG de la imagen:
#   notara-back:eureka-server-latest
#   notara-back:ms-usuarios-latest
#   notara-back:ms-usuarios-<sha-del-commit>
#   etc.
#
# SECRETS requeridos en este repo:
#   AWS_ACCESS_KEY_ID       → Credencial AWS Academy
#   AWS_SECRET_ACCESS_KEY   → Credencial AWS Academy
#   AWS_SESSION_TOKEN       → Token de sesión Academy (rota cada 4h)
#   AWS_REGION              → us-east-1
#   AWS_ACCOUNT_ID          → ID de tu cuenta AWS (12 dígitos)
#   EKS_CLUSTER_NAME        → notara-cluster
#   JWT_SECRET, JWT_REFRESH_SECRET
#   SPOTIFY_CLIENT_ID, SPOTIFY_CLIENT_SECRET
#   MAIL_USERNAME, MAIL_PASSWORD
# ============================================================
name: ⚙️ Deploy Backend to EKS

on:
  push:
    branches: [deploy]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPO: notara-back # ← un solo repo para todos los microservicios
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Build y Push de los 8 microservicios en paralelo
  # Cada uno se publica como notara-back:<servicio>-<tag>
  # ──────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push — ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: eureka-server
            path: eureka-server

          - name: ms-usuarios
            path: ms-usuarios

          - name: ms-canciones
            path: ms-canciones

          - name: ms-notas-metas
            path: ms-notas-metas

          - name: ms-pagos-subscripciones
            path: ms-pagos-subscripciones

          - name: ms-notificaciones
            path: ms-notificaciones

          - name: ms-vocabulario
            path: ms-vocabulario

          - name: api-gateway
            path: api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push ${{ matrix.service.name }}
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}
          SERVICE=${{ matrix.service.name }}

          echo "🔨 Construyendo ${SERVICE}..."
          docker build \
            -t ${IMAGE_URI}:${SERVICE}-${{ env.IMAGE_TAG }} \
            -t ${IMAGE_URI}:${SERVICE}-latest \
            ./${{ matrix.service.path }}

          echo "📤 Haciendo push a ECR..."
          docker push ${IMAGE_URI}:${SERVICE}-${{ env.IMAGE_TAG }}
          docker push ${IMAGE_URI}:${SERVICE}-latest

          echo "✅ ${SERVICE} publicado como ${IMAGE_URI}:${SERVICE}-latest"

  # ──────────────────────────────────────────────────────────
  # JOB 2: Deploy a EKS
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EKS — notara-backend
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Apply namespace & config
        run: |
          kubectl apply -f k8s/00-config.yaml

      - name: Create/update app secret
        run: |
          kubectl create secret generic backend-secret \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
            --from-literal=SPOTIFY_CLIENT_ID="${{ secrets.SPOTIFY_CLIENT_ID }}" \
            --from-literal=SPOTIFY_CLIENT_SECRET="${{ secrets.SPOTIFY_CLIENT_SECRET }}" \
            --from-literal=MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
            --from-literal=MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
            -n notara-backend \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Inyectar la imagen REAL de cada servicio en el manifiesto ──
      # Cada Deployment en 01-deployments.yaml tiene un placeholder distinto:
      #   image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/notara/<servicio>:latest
      # Lo reemplazamos por:
      #   image: <ECR_REGISTRY>/notara-back:<servicio>-<sha>
      - name: Inject ECR image URIs into manifests
        run: |
          ECR=${{ env.ECR_REGISTRY }}
          REPO=${{ env.ECR_REPO }}
          TAG=${{ env.IMAGE_TAG }}

          declare -A SERVICES=(
            ["notara/eureka-server"]="eureka-server"
            ["notara/ms-usuarios"]="ms-usuarios"
            ["notara/ms-canciones"]="ms-canciones"
            ["notara/ms-notas-metas"]="ms-notas-metas"
            ["notara/ms-pagos-subscripciones"]="ms-pagos-subscripciones"
            ["notara/ms-notificaciones"]="ms-notificaciones"
            ["notara/ms-vocabulario"]="ms-vocabulario"
            ["notara/api-gateway"]="api-gateway"
          )

          for OLD_NAME in "${!SERVICES[@]}"; do
            SERVICE_TAG="${SERVICES[$OLD_NAME]}"
            OLD_IMAGE="ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/${OLD_NAME}:latest"
            NEW_IMAGE="${ECR}/${REPO}:${SERVICE_TAG}-${TAG}"

            sed -i "s|${OLD_IMAGE}|${NEW_IMAGE}|g" k8s/01-deployments.yaml
          done

          echo "📋 Imágenes inyectadas:"
          grep "image:" k8s/01-deployments.yaml

      - name: Apply deployments
        run: |
          kubectl apply -f k8s/01-deployments.yaml

      - name: Wait for Eureka Server
        run: |
          echo "⏳ Eureka Server (servicio base)..."
          kubectl rollout status deployment/eureka-server \
            -n notara-backend --timeout=180s

      - name: Wait for all microservices
        run: |
          SERVICES=(
            "ms-usuarios"
            "ms-canciones"
            "ms-notas-metas"
            "ms-pagos"
            "ms-notificaciones"
            "ms-vocabulario"
            "api-gateway"
          )

          for svc in "${SERVICES[@]}"; do
            echo "⏳ Esperando deployment/$svc ..."
            kubectl rollout status deployment/$svc \
              -n notara-backend --timeout=180s
          done

      - name: Show final status
        run: |
          echo ""
          echo "✅ Deploy completado — commit: ${{ env.IMAGE_TAG }}"
          echo ""
          echo "📊 Pods en notara-backend:"
          kubectl get pods -n notara-backend
          echo ""
          echo "🌐 Services:"
          kubectl get svc -n notara-backend
