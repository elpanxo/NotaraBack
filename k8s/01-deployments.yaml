# ============================================================
# notara-backend / k8s / 01-deployments.yaml
# Todos los microservicios del backend
# Orden recomendado de deploy: eureka → ms-* → api-gateway
# ============================================================

# ══════════════════════════════════════════════════════════
# 1. EUREKA SERVER — registro de servicios Spring
#    Puerto: 8761 | Imagen: notara/eureka-server
# ══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: notara-backend
  labels:
    app: eureka-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/notara/eureka-server:latest
          ports:
            - containerPort: 8761
          env:
            - name: SERVER_PORT
              value: "8761"
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "350m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server-svc
  namespace: notara-backend
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
  type: ClusterIP

---
# ══════════════════════════════════════════════════════════
# 2. MS-USUARIOS — Spring Boot + PostgreSQL + Redis + JWT
#    Puerto: 8081 | Imagen: notara/ms-usuarios
# ══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-usuarios
  namespace: notara-backend
  labels:
    app: ms-usuarios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-usuarios
  template:
    metadata:
      labels:
        app: ms-usuarios
    spec:
      containers:
        - name: ms-usuarios
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/notara/ms-usuarios:latest
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: EUREKA_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: EUREKA_URL
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: POSTGRES_USUARIOS_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: POSTGRES_PASSWORD
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_REFRESH_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ms-usuarios-svc
  namespace: notara-backend
spec:
  selector:
    app: ms-usuarios
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP

