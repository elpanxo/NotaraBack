server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: ms-vocabulario

  datasource:
    url: jdbc:postgresql://postgres-vocabulario:5432/notara-vocabulario-db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      # TTL por defecto (se sobreescribe por cache en RedisConfig)
      time-to-live: 300000

  jackson:
    serialization:
      write-dates-as-timestamps: false

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}
  instance:
    hostname: ms-vocabulario
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
